name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NEXT_PUBLIC_STELLAR_NETWORK: TESTNET
  NEXT_PUBLIC_FIREBASE_API_KEY: fake-api-key
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: fake.firebaseapp.com
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: fake-project
  NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org:443
  NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: fake-walletconnect-id

jobs:
  lint-type-test:
    name: Lint · Type-check · Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm test

  firestore-rules:
    name: Firestore Rules tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Run Firestore emulator & rules tests
        run: |
          firebase emulators:exec --only firestore "pnpm test:rules" &
          EMU_PID=$!
          # Wait for emulator to be ready then run tests
          npx wait-on tcp:8080 -t 30000 2>/dev/null || true
          pnpm test:rules
          kill $EMU_PID 2>/dev/null || true
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint-type-test]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  contract-compile:
    name: Soroban contract compile
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/escrow/target
          key: cargo-${{ runner.os }}-${{ hashFiles('contracts/escrow/Cargo.lock', 'contracts/escrow/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: cargo check (wasm32)
        working-directory: contracts/escrow
        run: cargo check --target wasm32-unknown-unknown

  cloud-functions-typecheck:
    name: Cloud Functions type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install functions dependencies
        working-directory: functions
        run: npm install

      - name: Type-check functions
        working-directory: functions
        run: npx tsc --noEmit

  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-type-test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: TESTNET
          NEXT_PUBLIC_FIREBASE_API_KEY: fake-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: fake.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: fake-project
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org:443
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: fake-walletconnect-id
